name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Compute version metadata
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag ${TAG} is not in vMAJOR.MINOR.PATCH form" >&2
            exit 1
          fi
          VERSION="${TAG#v}"
          SHA="${GITHUB_SHA::7}"
          echo "version=${VERSION}" >> "${GITHUB_OUTPUT}"
          echo "informational=${VERSION}+${SHA}" >> "${GITHUB_OUTPUT}"

      - name: Publish win-x64 single-file
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          INFORMATIONAL: ${{ steps.ver.outputs.informational }}
        run: ./DocFormatter.Cli/publish.sh

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: DocFormatter.Cli/bin/Release/net10.0/win-x64/publish/docformatter.exe
          generate_release_notes: true
          fail_on_unmatched_files: true
